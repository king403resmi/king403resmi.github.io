title: KING403
title_separator: "-"
tagline: Perusahaan Teknologi Digital Indonesia
description: >-
  KING403 - brand dan perusahaan teknologi digital Indonesia resmi sejak 2020.
  Platform engineering, brand strategy, cloud infrastructure & customer operations.
  Situs resmi king403.it.com | developer apidevel.org | portal korporat king403resmi.github.io
theme: minima
url: "https://king403resmi.github.io"
baseurl: ""
lang: id

repository: king403resmi/king403resmi.github.io
github_username: King403resmi

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-github-metadata

seo:
  og_title: "KING403 - Situs Resmi Brand & Perusahaan Teknologi Digital Indonesia"
  keywords: >-
    KING403, king403, king 403, KING403 resmi, KING403 official, KING403 Indonesia,
    perusahaan KING403, brand KING403, situs KING403, KING403 teknologi digital,
    king403.it.com, KING403 portal, KING403 perusahaan, KING403 company
  image: "/assets/images/og-image.svg"

logo: "/assets/images/logo.svg"

twitter:
  username: King403resmi
  card: summary_large_image

header_pages:
  - tentang.md
  - layanan.md
  - proyek.md
  - testimoni.md
  - teknologi.md
  - berita.md
  - mitra.md
  - karir.md
  - faq.md
  - kontak.md

author:
  name: KING403
  email: hello@king403.com

email: hello@king403.com

minima:
  social_links:
    github: King403resmi
    email: hello@king403.com

# Domain & jejak digital resmi
official:
  site: "https://king403.it.com"
  developer: "https://apidevel.org"
  corporate_portal: "https://king403resmi.github.io"
  nekoweb: "https://king403.nekoweb.org"
  github_org: "https://github.com/King403resmi"
  github_repo: "https://github.com/king403resmi/king403resmi.github.io"
  github_situs_org: "https://github.com/King403situs"
  github_situs_repo: "https://github.com/King403situs/king403situs.github.io"
  portal_brand: "https://king403situs.github.io"
  heycard: "https://heycard.link/king403"
  heylink: "https://heylink.me/king403.it.com/"
  youtube: "https://www.youtube.com/@seosementara5"

markdown: kramdown
permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - deploy-github.ps1
  - push.ps1
  - vendor

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "k403-page"
      image: "/assets/images/og-image.svg"
  - scope:
      path: "index.md"
    values:
      layout: "default"
      permalink: "/"
  - scope:
      path: "sitemap.xml"
    values:
      layout: null
      sitemap: false
  - scope:
      path: "404.html"
    values:
      layout: "k403-page"
      sitemap: false
  - scope:
      path: "redirects/**"
    values:
      layout: "redirect"
      sitemap: false
