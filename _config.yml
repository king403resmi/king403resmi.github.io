title: KING403
description: Perusahaan teknologi digital, pengembangan platform, dan konsultasi brand Indonesia sejak 2020
theme: minima
url: "https://king403resmi.github.io"
baseurl: ""
lang: id

# Repo GitHub Pages (internal link + metadata)
repository: king403resmi/king403resmi.github.io

# Profil GitHub — muncul di footer theme Minima
github_username: King403resmi

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-github-metadata

header_pages:
  - tentang.md
  - layanan.md
  - proyek.md
  - teknologi.md
  - berita.md
  - profil-digital.md
  - mitra.md
  - tim.md
  - karir.md
  - faq.md
  - kontak.md

author:
  name: KING403
  email: hello@king403.com

# Social links — footer Minima + SEO entity
minima:
  social_links:
    github: King403resmi
    email: hello@king403.com

# Jejak digital resmi (sameAs reference untuk konten MD)
social:
  github_org: "https://github.com/King403resmi"
  github_website_repo: "https://github.com/king403resmi/king403resmi.github.io"
  github_situs: "https://github.com/King403situs"
  website: "https://king403resmi.github.io"
  linkedin: "https://www.linkedin.com/company/king403"
  email: "mailto:hello@king403.com"

markdown: kramdown
permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - deploy-github.ps1
  - push.ps1
  - vendor
