<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "KING403",
  "url": "{{ site.official.site }}/",
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "5",
    "reviewCount": "{{ site.data.testimonials.size }}",
    "bestRating": "5",
    "worstRating": "5"
  },
  "review": [
    {%- for t in site.data.testimonials limit:6 -%}
    {
      "@type": "Review",
      "author": {
        "@type": "Person",
        "name": "{{ t.name }}"
      },
      "reviewRating": {
        "@type": "Rating",
        "ratingValue": "{{ t.rating }}",
        "bestRating": "5"
      },
      "reviewBody": "{{ t.quote | escape }}"
    }{%- unless forloop.last -%},{%- endunless -%}
    {%- endfor -%}
  ]
}
</script>
