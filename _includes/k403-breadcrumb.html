{%- assign is_home = false -%}
{%- if page.url == '/' or page.url == '/index.html' -%}
  {%- assign is_home = true -%}
{%- endif -%}
{%- unless is_home -%}
<nav class="k403-breadcrumb" aria-label="Breadcrumb">
  <ol class="k403-breadcrumb__list" itemscope itemtype="https://schema.org/BreadcrumbList">
    <li class="k403-breadcrumb__item" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
      <a href="{{ '/' | relative_url }}" itemprop="item"><span itemprop="name">Beranda</span></a>
      <meta itemprop="position" content="1">
    </li>
    <li class="k403-breadcrumb__item k403-breadcrumb__item--current" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem" aria-current="page">
      <span itemprop="name">{{ page.title | escape }}</span>
      <meta itemprop="item" content="{{ page.url | absolute_url }}">
      <meta itemprop="position" content="2">
    </li>
  </ol>
</nav>
{%- endunless -%}
